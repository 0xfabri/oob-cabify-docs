<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OOB · Cabify — Ideas de Contenido</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cabify: #7C3AED;
      --oob:    #F5A623;
      --bg:     #F9F8FF;
      --card:   #FFFFFF;
      --text:   #1A1A2E;
      --muted:  #6B7280;
      --radius: 16px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      color: var(--text);
    }

    /* ── HEADER ── */
    .header {
      display: flex;
      align-items: center;
      gap: 28px;
      margin-bottom: 48px;
    }

    .logo-cabify {
      height: 36px;
      width: auto;
    }

    .divider {
      width: 1px;
      height: 40px;
      background: linear-gradient(180deg, var(--cabify), var(--oob));
      opacity: 0.4;
    }

    .logo-oob {
      height: 32px;
      width: auto;
    }

    /* ── TITLE ── */
    .title {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 28px;
    }

    /* ── CARDS ── */
    .cards {
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 100%;
      max-width: 520px;
    }

    .card {
      display: flex;
      align-items: center;
      gap: 20px;
      background: var(--card);
      border: 1.5px solid rgba(124, 58, 237, 0.12);
      border-radius: var(--radius);
      padding: 20px 24px;
      text-decoration: none;
      color: var(--text);
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
      box-shadow: 0 2px 8px rgba(124, 58, 237, 0.06);
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(124, 58, 237, 0.15);
      border-color: rgba(124, 58, 237, 0.35);
    }

    .card-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--cabify), #9B69F5);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .card-icon svg {
      width: 22px;
      height: 22px;
      fill: white;
    }

    .card-body {
      flex: 1;
    }

    .card-title {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 3px;
    }

    .card-sub {
      font-size: 12px;
      color: var(--muted);
    }

    .card-arrow {
      color: var(--cabify);
      opacity: 0.5;
      transition: opacity 0.18s, transform 0.18s;
      flex-shrink: 0;
    }

    .card:hover .card-arrow {
      opacity: 1;
      transform: translateX(4px);
    }

    /* ── FOOTER ── */
    .footer {
      margin-top: 48px;
      font-size: 11px;
      color: var(--muted);
      opacity: 0.6;
      letter-spacing: 0.04em;
    }
  </style>
</head>
